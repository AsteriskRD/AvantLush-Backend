services:
  - type: web
    name: avantlush-backend
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn avantlush_backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.9"
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: avantlush_db
          property: connectionString

databases:
  - name: avantlush_db
    databaseName: avantlush
    plan: free